<!DOCTYPE html>
<html>
    <head>
        <link rel="icon" href="data:,">
        <style>
            ul {
              flex-wrap: wrap;
              display: flex;
            }
            ul li {
              flex: 1 0 26%;
              margin-left: 7%;
            }
            body {
                background-color: #202020;
            }
            p {
                color: #888888;
            }
            div {
                display: block;
                margin: auto;
                width: 280px;
                padding-bottom: 10px;
            }
            div img {
                margin-top: 20px;
                position: relative;
                width: 50px;
            }
            div input {
                top: -17px;
                position: relative;
                font-size: 16pt;
            }
            .search-box {
    display: flex;
    align-items: center;
    background: #2a2a2a;
    border-radius: 6px;
    padding: 5px 10px;
    border: 1px solid #555;
}

.search-box input {
    border: none;
    outline: none;
    background: transparent;
    flex: 1;
}
.search-box img {
    width: 50px;
    height: 50px;
    cursor: pointer;
    transition: transform 0.2s ease;
}

.search-box img:hover {
    transform: scale(1.1);
}
        </style>
        <script>
            function search () {
                window.location.href = '../search/' + document.getElementById('search').value;
            }
        </script>
    </head>
    <title>Manga Directory</title>
    <div>
        <div class="search-box">
            <input type="text" id="search"
       value="{{ qry }}"
       oninput="updateQuery(this.value)"
       onkeydown="if(event.key==='Enter') search()" />
            <img src="/assets/icons/Search.png" onclick="search()" />
        </div>
    </div>
    <ul style = "list-style: none;" margin = "0 auto;">
    {% for chp in chps %}
        <li>
            <a href = "{{ url_for('read_page', chapter_name=chp[2], page_index=0) }}"><img src = "/{{ chp[1] }}" alt="tst" width = "300"/></a>
            <p> {{ chp[0] }} </p>
        </li>
    {% endfor %}
    {% for vid in vids %}
        <li>
            <a href = "{{ url_for('read_page', chapter_name=chp[2], page_index=0) }}"><img src = "/{{ chp[1] }}" alt="tst" width = "300"/></a>
            <p> {{ vid[0] }} </p>
        </li>
    {% endfor %}
    </ul>
</html>
